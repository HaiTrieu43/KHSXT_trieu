<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - C.P. Bình Dương KHSX Automator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-color: #0d0f14;
            --card-bg: rgba(22, 28, 38, 0.45);
            --card-border: rgba(255, 255, 255, 0.07);
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #a855f7 100%);
            --glow-color: rgba(59, 130, 246, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --red: #ff4d4d;
            --red-glow: rgba(255, 77, 77, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Futuristic Background Shapes */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.25;
        }

        .shape-1 {
            top: -10%;
            right: 10%;
            width: 450px;
            height: 450px;
            background: #3b82f6;
            animation: drift 25s infinite alternate ease-in-out;
        }

        .shape-2 {
            bottom: -15%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: #a855f7;
            animation: drift 30s infinite alternate-reverse ease-in-out;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.15); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        /* Login Wrapper */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 430px;
            padding: 2rem;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glassmorphism Card */
        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* Branding Header */
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-container {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }

        .logo-accent {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text {
            color: var(--text-main);
        }

        .login-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
            padding-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1.25rem;
            color: var(--text-muted);
            transition: color 0.3s;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: rgba(17, 24, 39, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1rem 1rem 1rem 3rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        .form-input:focus {
            border-color: #3b82f6;
            background: rgba(17, 24, 39, 0.85);
            box-shadow: 0 0 0 4px var(--glow-color);
        }

        .form-input:focus + i {
            color: #3b82f6;
        }

        /* Error Alert */
        .error-alert {
            background: var(--red-glow);
            border: 1px solid rgba(255, 77, 77, 0.2);
            color: var(--red);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: shake 0.4s linear;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1.1rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.4);
            filter: brightness(1.1);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Footer Credits */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    <span class="logo-accent">C.P.</span>
                    <span class="logo-text">Bình Dương</span>
                </div>
                <div class="login-subtitle">KHSX AUTOMATOR</div>
            </div>

            <form method="POST" action="/login">
                {% if error %}
                <div class="error-alert">
                    <i data-lucide="alert-triangle" style="width: 1.1rem; height: 1.1rem;"></i>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <div class="form-group">
                    <label class="form-label" for="username">Tên đăng nhập</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="text" id="username" name="username" placeholder="Nhập tài khoản" required autofocus autocomplete="username">
                        <i data-lucide="user" style="width: 1.1rem; height: 1.1rem;"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                        <i data-lucide="lock" style="width: 1.1rem; height: 1.1rem;"></i>
                    </div>
                </div>

                <button class="btn-submit" type="submit">
                    <span>Đăng nhập hệ thống</span>
                    <i data-lucide="arrow-right" style="width: 1.1rem; height: 1.1rem;"></i>
                </button>
            </form>
        </div>
        
        <div class="login-footer">
            v2.2 © C.P. Vietnam Corporation
        </div>
    </div>

    <script>
        // Khởi tạo các biểu tượng Lucide
        lucide.createIcons();
    </script>
</body>
</html>
